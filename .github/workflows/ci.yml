name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  versions:
    name: Packaging version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check packaging versions agree
        run: ./.packages/check-versions.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cmake pkg-config libnotify-dev libcurl4-openssl-dev

      - name: Check formatting
        run: |
          find src include tests -type f \( -name '*.c' -o -name '*.h' \) \
            -not -name 'version.h.in' -print0 \
            | xargs -0 clang-format --dry-run --Werror

      - name: Enforce country_internal.h stays test-only
        run: |
          # src/core/country_internal.h exposes the internal ISO 3166-1 table so
          # the invariant tests can iterate it. Only its defining TU
          # (src/core/country.c) and tests/ may include it — production code
          # must go through include/country.h.
          offenders=$(grep -rl 'country_internal\.h' src include \
            | grep -vx 'src/core/country.c' \
            | grep -vx 'src/core/country_internal.h' || true)
          if [ -n "$offenders" ]; then
            echo "ERROR: country_internal.h is a test-only seam, but production code includes it:"
            echo "$offenders"
            exit 1
          fi
          echo "OK: country_internal.h is not included by production code."

      - name: Configure (for clang-tidy compile commands)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy (informational)
        run: find src -type f -name '*.c' -print0 | xargs -0 clang-tidy -p build || true

  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libnotify-dev libcurl4-openssl-dev

      - name: Configure
        env:
          CC: ${{ matrix.compiler }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --no-tests=error

  build-and-test-msvc:
    name: build-and-test (msvc ${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      # Report both architectures independently; an ARM64 break should not hide
      # the x64 result (matches release.yml).
      fail-fast: false
      matrix:
        arch: [x64, ARM64]
    steps:
      - uses: actions/checkout@v5

      # -A selects the target architecture for the Visual Studio generator.
      # Without it the build silently follows the runner's host arch (x64),
      # which is why ARM64 used to be built only by release.yml -- so an
      # ARM64-only break surfaced mid-release rather than on the PR causing it.
      - name: Configure
        run: cmake -B build -A ${{ matrix.arch }} -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release

      # The runner is x64 and cannot execute ARM64 binaries, so ARM64 gets
      # compile-and-link coverage only; x64 additionally runs the suite.
      - name: Test
        if: matrix.arch == 'x64'
        run: ctest --test-dir build --output-on-failure -C Release --no-tests=error
