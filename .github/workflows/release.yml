name: Release

on:
  push:
    tags: ['v*']

# Least privilege by default; only the publish job is granted write below.
permissions:
  contents: read

jobs:
  linux:
    name: Build Linux tarball (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libnotify-dev libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Stage install tree
        env:
          STAGE: muslimtify-${{ steps.ver.outputs.version }}-linux-${{ matrix.arch }}
        run: |
          cmake --install build --prefix "dist/${STAGE}"
          cp LICENSE README.md "dist/${STAGE}/"

      - name: Package tarball
        env:
          STAGE: muslimtify-${{ steps.ver.outputs.version }}-linux-${{ matrix.arch }}
        run: tar czf "${STAGE}.tar.gz" -C dist "${STAGE}"

      - uses: actions/upload-artifact@v6
        with:
          name: linux-${{ matrix.arch }}
          path: muslimtify-*-linux-${{ matrix.arch }}.tar.gz

  windows:
    name: Build Windows installer (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, cmakeArch: x64 }
          - { arch: arm64, cmakeArch: ARM64 }
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        shell: pwsh
        run: "echo \"version=$($env:GITHUB_REF_NAME.TrimStart('v'))\" >> $env:GITHUB_OUTPUT"

      - name: Configure
        run: cmake -B build -A ${{ matrix.cmakeArch }} -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Stage install tree
        run: cmake --install build --prefix installer/staging --config Release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "/DArch=${{ matrix.arch }}" `
            .packages\winget\muslimtify.iss

      - uses: actions/upload-artifact@v6
        with:
          name: windows-${{ matrix.arch }}
          path: dist/muslimtify-*-setup-${{ matrix.arch }}.exe

  release:
    name: Publish release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to upload assets to the GitHub Release
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum muslimtify-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload assets to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            Prebuilt binaries for ${{ github.ref_name }}.

            **Linux** (dynamically linked — install `libnotify` and `libcurl`
            from your distro first):
            - **x86_64** — `muslimtify-*-linux-x86_64.tar.gz`
            - **aarch64** — `muslimtify-*-linux-aarch64.tar.gz`

            **Windows** — run the installer for your architecture:
            - **x64** — `muslimtify-*-setup-x64.exe`
            - **arm64** — `muslimtify-*-setup-arm64.exe`

            Verify downloads with `sha256sum -c SHA256SUMS`.

            For distro-native installs (Fedora COPR, Debian `.deb`, winget) see the README.
